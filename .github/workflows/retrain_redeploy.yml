name: Retrain and Redeploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  HF_SPACE_NAME: "Franck504/fruits_unsupervised_learning_xai"

on:
  push:
    branches: ["main"]
    paths:
      - "data/raw/**"
      - "src/**"
      - "deployment/**"
      - "scripts/publish_to_hf_space.sh"
      - "dvc.yaml"
      - "requirements.txt"
      - ".github/workflows/retrain_redeploy.yml"
  workflow_dispatch:

jobs:
  train-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: DVC pull
        run: |
          dvc pull

      - name: DVC reproduce pipeline
        run: |
          dvc repro

      - name: Quality gate
        run: |
          python - <<'PY'
          import json
          s = json.load(open('reports/summary.json'))
          print('Summary:', s)
          assert s['proxy_accuracy'] >= 0.90, 'Proxy accuracy below threshold'
          assert s['proxy_f1_macro'] >= 0.90, 'Proxy F1 macro below threshold'
          assert s['stability_ari_mean'] >= 0.90, 'Cluster stability ARI mean below threshold'
          PY

      - name: Validate Hugging Face secrets
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
        run: |
          test -n "$HF_TOKEN" || (echo "HF_TOKEN secret is missing" && exit 1)
          test -n "$HF_SPACE_REPO" || (echo "HF_SPACE_REPO secret is missing" && exit 1)
          echo "Hugging Face secrets are configured"

      - name: Publish to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
        run: |
          bash scripts/publish_to_hf_space.sh
