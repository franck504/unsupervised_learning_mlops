<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="320" viewBox="0 0 1000 320">
  <style>
    .box{fill:#f7f9fc;stroke:#2b6cb0;stroke-width:2;rx:8;}
    .title{font:700 14px/1.2 Arial, sans-serif;fill:#0b3b66}
    .label{font:400 12px/1.2 Arial, sans-serif;fill:#102a43}
    .arrow{stroke:#2b6cb0;stroke-width:2;fill:none;marker-end:url(#arrowhead)}
    .small{font:400 11px/1.2 Arial, sans-serif;fill:#334e68}
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2b6cb0"/>
    </marker>
  </defs>

  <!-- Boxes -->
  <rect x="20" y="30" width="140" height="60" class="box"/>
  <text x="90" y="55" text-anchor="middle" class="title">Git</text>
  <text x="90" y="72" text-anchor="middle" class="small">push / CI</text>

  <rect x="190" y="30" width="180" height="60" class="box"/>
  <text x="280" y="52" text-anchor="middle" class="title">GitHub Actions</text>
  <text x="280" y="72" text-anchor="middle" class="small">CI: dvc pull / repro</text>

  <rect x="400" y="30" width="140" height="60" class="box"/>
  <text x="470" y="55" text-anchor="middle" class="title">DVC</text>
  <text x="470" y="72" text-anchor="middle" class="small">data & artifacts</text>

  <rect x="560" y="30" width="160" height="60" class="box"/>
  <text x="640" y="52" text-anchor="middle" class="title">Entraînement</text>
  <text x="640" y="72" text-anchor="middle" class="small">StandardScaler → KMeans → proxy RF</text>

  <rect x="740" y="30" width="180" height="60" class="box"/>
  <text x="830" y="48" text-anchor="middle" class="title">MLflow</text>
  <text x="830" y="68" text-anchor="middle" class="small">tracking & registry</text>

  <!-- Second row -->
  <rect x="120" y="150" width="200" height="60" class="box"/>
  <text x="220" y="172" text-anchor="middle" class="title">Hugging Face Space</text>
  <text x="220" y="190" text-anchor="middle" class="small">Gradio app (predict & explain)</text>

  <rect x="360" y="150" width="160" height="60" class="box"/>
  <text x="440" y="172" text-anchor="middle" class="title">Inference Logs</text>
  <text x="440" y="190" text-anchor="middle" class="small">inference_logs/inferences.csv</text>

  <rect x="560" y="150" width="220" height="60" class="box"/>
  <text x="670" y="172" text-anchor="middle" class="title">Monitoring</text>
  <text x="670" y="190" text-anchor="middle" class="small">PSI / Evidently</text>

  <!-- Arrows top row -->
  <path d="M160 60 L190 60" class="arrow"/>
  <path d="M370 60 L400 60" class="arrow"/>
  <path d="M540 60 L560 60" class="arrow"/>
  <path d="M720 60 L740 60" class="arrow"/>

  <!-- Arrows down to second row -->
  <path d="M820 90 L740 140" class="arrow"/>
  <path d="M640 90 L500 140" class="arrow"/>
  <path d="M470 90 L300 140" class="arrow"/>

  <!-- Arrows second row -->
  <path d="M320 180 L360 180" class="arrow"/>
  <path d="M520 180 L560 180" class="arrow"/>

  <!-- Footer -->
  <text x="500" y="305" text-anchor="middle" class="small">Pipeline simplifié : push → CI → DVC → entraînement → déploiement → inférence → monitoring</text>
</svg>
