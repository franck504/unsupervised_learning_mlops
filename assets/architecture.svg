<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="280" viewBox="0 0 1000 280">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0 10 3.5 0 7" fill="#333"/>
    </marker>
  </defs>

  <!-- Background groups -->
  <rect x="5" y="5" width="270" height="120" rx="8" fill="#f0f8ff" opacity="0.3" stroke="none"/>
  <text x="15" y="18" font-size="10" font-weight="bold" fill="#0066cc">SOURCE ET CI/CD</text>

  <rect x="290" y="5" width="380" height="120" rx="8" fill="#fffacd" opacity="0.3" stroke="none"/>
  <text x="300" y="18" font-size="10" font-weight="bold" fill="#cc8800">ENTRAÎNEMENT ET VALIDATION</text>

  <rect x="685" y="5" width="310" height="120" rx="8" fill="#e6ffe6" opacity="0.3" stroke="none"/>
  <text x="695" y="18" font-size="10" font-weight="bold" fill="#009900">DÉPLOIEMENT ET SUIVI</text>

  <!-- TOP ROW: Main pipeline -->
  <!-- 1. Source -->
  <rect x="10" y="30" width="110" height="70" rx="6" fill="#e8f4f8" stroke="#2b6cb0" stroke-width="2"/>
  <text x="65" y="50" text-anchor="middle" font-size="11" font-weight="bold" fill="#0b3b66">Git Push</text>
  <text x="65" y="68" text-anchor="middle" font-size="9" fill="#334e68">data/raw/</text>
  <text x="65" y="80" text-anchor="middle" font-size="9" fill="#334e68">fruits.csv</text>

  <!-- 2. CI -->
  <rect x="135" y="30" width="110" height="70" rx="6" fill="#e8f4f8" stroke="#2b6cb0" stroke-width="2"/>
  <text x="190" y="50" text-anchor="middle" font-size="11" font-weight="bold" fill="#0b3b66">GitHub</text>
  <text x="190" y="68" text-anchor="middle" font-size="9" fill="#334e68">Actions</text>
  <text x="190" y="80" text-anchor="middle" font-size="9" fill="#667e99">(CI/CD)</text>

  <!-- Arrow -->
  <line x1="120" y1="65" x2="135" y2="65" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 3. Training -->
  <rect x="300" y="30" width="120" height="70" rx="6" fill="#fff8dc" stroke="#b8860b" stroke-width="2"/>
  <text x="360" y="48" text-anchor="middle" font-size="11" font-weight="bold" fill="#8b6914">KMeans</text>
  <text x="360" y="63" text-anchor="middle" font-size="9" fill="#8b7500">Clustering</text>
  <text x="360" y="75" text-anchor="middle" font-size="8" fill="#a39e93">(k=2 à 10)</text>

  <!-- Arrow -->
  <line x1="245" y1="65" x2="300" y2="65" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 4. Proxy for XAI -->
  <rect x="440" y="30" width="120" height="70" rx="6" fill="#fff8dc" stroke="#b8860b" stroke-width="2"/>
  <text x="500" y="48" text-anchor="middle" font-size="11" font-weight="bold" fill="#8b6914">Proxy RF</text>
  <text x="500" y="63" text-anchor="middle" font-size="9" fill="#8b7500">Modèle SHAP</text>
  <text x="500" y="75" text-anchor="middle" font-size="8" fill="#a39e93">(300 arbres)</text>

  <!-- Arrow -->
  <line x1="420" y1="65" x2="440" y2="65" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 5. MLflow -->
  <rect x="580" y="30" width="90" height="70" rx="6" fill="#e8e8f5" stroke="#6c3483" stroke-width="2"/>
  <text x="625" y="50" text-anchor="middle" font-size="11" font-weight="bold" fill="#5d2e7a">MLflow</text>
  <text x="625" y="68" text-anchor="middle" font-size="9" fill="#483d8b">Registre</text>

  <!-- Arrow -->
  <line x1="560" y1="65" x2="580" y2="65" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Quality Gate box -->
  <rect x="305" y="105" width="310" height="18" rx="4" fill="#ffe6e6" stroke="#d9534f" stroke-width="1.5"/>
  <text x="460" y="116" text-anchor="middle" font-size="8" font-weight="bold" fill="#c9302c">Validation qualité: stabilité ARI &gt;= 0.90, exactitude proxy &gt;= 0.90</text>

  <!-- 6. HF Space Deployment -->
  <rect x="695" y="30" width="130" height="70" rx="6" fill="#e6f9e6" stroke="#2d7a2d" stroke-width="2"/>
  <text x="760" y="46" text-anchor="middle" font-size="11" font-weight="bold" fill="#2d7a2d">HF Space</text>
  <text x="760" y="61" text-anchor="middle" font-size="9" fill="#3d7a3d">App Gradio</text>
  <text x="760" y="75" text-anchor="middle" font-size="8" fill="#667e99">prédiction + SHAP</text>

  <!-- Arrow -->
  <line x1="670" y1="65" x2="695" y2="65" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>

  <!-- 7. Monitoring -->
  <rect x="840" y="30" width="150" height="70" rx="6" fill="#e6f9e6" stroke="#2d7a2d" stroke-width="2"/>
  <text x="915" y="46" text-anchor="middle" font-size="11" font-weight="bold" fill="#2d7a2d">Suivi</text>
  <text x="915" y="61" text-anchor="middle" font-size="9" fill="#3d7a3d">PSI, Evidently</text>
  <text x="915" y="75" text-anchor="middle" font-size="8" fill="#667e99">détection drift</text>

  <!-- Arrow -->
  <line x1="825" y1="65" x2="840" y2="65" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>

  <!-- BOTTOM ROW: Artifacts -->
  <text x="10" y="155" font-size="10" font-weight="bold" fill="#333">ARTEFACTS:</text>

  <!-- Models -->
  <rect x="10" y="165" width="100" height="60" rx="4" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
  <text x="60" y="180" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Modèles</text>
  <text x="60" y="195" text-anchor="middle" font-size="8" fill="#555">scaler, kmeans,</text>
  <text x="60" y="207" text-anchor="middle" font-size="8" fill="#555">proxy_rf</text>

  <!-- Data -->
  <rect x="120" y="165" width="100" height="60" rx="4" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
  <text x="170" y="180" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Données</text>
  <text x="170" y="195" text-anchor="middle" font-size="8" fill="#555">fruits_clustered</text>
  <text x="170" y="207" text-anchor="middle" font-size="8" fill="#555">.csv</text>

  <!-- Reports -->
  <rect x="230" y="165" width="100" height="60" rx="4" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
  <text x="280" y="180" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Rapports</text>
  <text x="280" y="195" text-anchor="middle" font-size="8" fill="#555">métriques, stabilité,</text>
  <text x="280" y="207" text-anchor="middle" font-size="8" fill="#555">matrice confusion</text>

  <!-- Inference Logs -->
  <rect x="340" y="165" width="100" height="60" rx="4" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
  <text x="390" y="180" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Journaux</text>
  <text x="390" y="195" text-anchor="middle" font-size="8" fill="#555">inference_logs/</text>
  <text x="390" y="207" text-anchor="middle" font-size="8" fill="#555">inferences.csv</text>

  <!-- DVC Versioning -->
  <rect x="450" y="165" width="100" height="60" rx="4" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
  <text x="500" y="180" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">DVC</text>
  <text x="500" y="195" text-anchor="middle" font-size="8" fill="#555">versioning données</text>
  <text x="500" y="207" text-anchor="middle" font-size="8" fill="#555">et suivi</text>

  <!-- Footer -->
  <text x="500" y="250" text-anchor="middle" font-size="9" font-weight="bold" fill="#333">Pipeline MLOps complet: Apprentissage non-supervisé (KMeans) + XAI (SHAP)</text>
  <text x="500" y="268" text-anchor="middle" font-size="8" fill="#666">CI/CD entièrement automatisé avec validation qualité, registre modèles, logs inférence, et suivi drift</text>
</svg>
